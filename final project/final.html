<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yared Sintayehu | Portfolio</title>
    <style>
      
      html,
      body,
      h1,
      h2,
      h3,
      p,
      ul,
      li,
      div,
      header,
      nav,
      main,
      section,
      article,
      footer {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background-color: #121212;
        color: #f5f5f5;
        font-family: Arial, sans-serif;
        line-height: 1.6;
      }
      a {
        color: #4299e1;
        text-decoration: none;
        cursor: pointer;
      }
      .container {
        width: 90%;
        max-width: 1000px;
        margin: 0 auto;
        padding: 20px;
      }
      header {
        background-color: #1a1a1a;
        border-bottom: 1px solid #2d3748;
        position: relative;
        z-index: 100;
      }
      nav {
        height: 70px;
      }
      .logo {
        float: left;
        font-size: 1.2rem;
        font-weight: bold;
        color: #f5f5f5;
        line-height: 70px;
        letter-spacing: 1px;
      }
      .nav-links {
        float: right;
        list-style: none;
        line-height: 70px;
      }
      .nav-links li {
        display: inline-block;
        margin-left: 25px;
      }
      .nav-links a {
        color: #a0aec0;
        font-weight: bold;
        font-size: 0.95rem;
      }
      .clearfix::after {
        content: "";
        clear: both;
        display: table;
      }
      .hero {
        padding: 80px 0 60px 0;
        text-align: center;
        border-bottom: 1px solid #2d3748;
        background-color: #1a1a1a;
      }
      .avatar-container {
        width: 110px;
        height: 110px;
        margin: 0 auto 24px auto;
        border-radius: 55px;
        background-color: #2d3748;
        border: 2px solid #2d3748;
        line-height: 106px;
        color: #4299e1;
        font-size: 2.2rem;
        font-weight: bold;
      }
      .hero h1 {
        font-size: 2.4rem;
        margin-bottom: 12px;
        letter-spacing: -0.5px;
        color: #f5f5f5;
      }
      .hero p {
        font-size: 1.05rem;
        color: #a0aec0;
        max-width: 600px;
        margin: 0 auto 28px auto;
      }
      .social-tags {
        text-align: center;
      }
      .badge {
        display: inline-block;
        background-color: #2d3748;
        color: #e2e8f0;
        border: 1px solid #2d3748;
        padding: 5px 14px;
        border-radius: 20px;
        font-size: 0.85rem;
        font-weight: bold;
        margin: 5px;
      }

      
      .projects-section {
        padding: 60px 0;
      }
      .section-title {
        font-size: 1.6rem;
        margin-bottom: 30px;
        text-align: center;
        letter-spacing: 0.5px;
      }
      .section-title-line {
        display: block;
        width: 40px;
        height: 3px;
        background-color: #4299e1;
        margin: 10px auto 0 auto;
        border-radius: 2px;
      }
      .projects-grid {
        width: 100%;
      }
      .project-card {
        background-color: #222222;
        border: 1px solid #2d3748;
        border-radius: 8px;
        margin-bottom: 30px;
        width: 100%;
        display: block;
      }
      .project-visual {
        height: 180px;
        background-color: #1a1a1a;
        text-align: center;
        border-bottom: 1px solid #2d3748;
        padding-top: 45px;
      }
      .project-info {
        padding: 24px;
      }
    </style>
  </head>
  <body>
    <div id="portfolio-view" style="display: block">
      <main>
        <section class="projects-section" id="projects">
          <div class="container">
            <h2 class="section-title">
            <span class="section-title-line"></span>
            </h2>
            <div class="projects-grid" id="projectsGrid">
              <article class="project-card" id="card-games-1">
                <div class="project-visual"></div>
                <div class="project-info"></div>
              </article>
              <article class="project-card" id="card-mechanical-1">
                <div class="project-visual"></div>
                <div class="project-info"></div>
              </article>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
