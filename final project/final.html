<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yared Sintayehu | Portfolio</title>
    <style>
        
        html, body, h1, h2, h3, p, ul, li, div, header, nav, main, section, article, footer {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #121212;
            color: #f5f5f5;
            font-family: Arial, sans-serif;
            line-height: 1.6;
        }

        a {
            color: #4299e1;
            text-decoration: none;
            cursor: pointer;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background-color: #1a1a1a;
            border-bottom: 1px solid #2d3748;
            position: relative;
            z-index: 100;
        }

        nav {
            height: 70px;
        }

        .logo {
            float: left;
            font-size: 1.2rem;
            font-weight: bold;
            color: #f5f5f5;
            line-height: 70px;
            letter-spacing: 1px;
        }

        .nav-links {
            float: right;
            list-style: none;
            line-height: 70px;
        }

        .nav-links li {
            display: inline-block;
            margin-left: 25px;
        }

        .nav-links a {
            color: #a0aec0;
            font-weight: bold;
            font-size: 0.95rem;
        }

        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
